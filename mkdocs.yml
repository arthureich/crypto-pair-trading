site_name: "Crypto Pair Trading Engine"
site_description: "Automated high-frequency pair trading system documentation"
site_author: "Antigravity Dev Team"

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - def_list
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - State Machine: state_machine.md
  - Event Contracts: event_contracts.md
  - Risk Limits: risk_limits.md
  - Recovery Protocol: recovery_protocol.md
